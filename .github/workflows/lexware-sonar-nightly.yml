# Nightly SonarQube analysis on the fork.
#
# This workflow lives ONLY on the fork's `master`. It is the single intentional
# divergent commit between our fork and upstream (ZUGFeRD/mustangproject).
# Each run rebases that commit onto upstream/master in-pipeline and force-pushes
# the result back, so the fork stays current and tomorrow's fetch is small.
#
# Do NOT use GitHub's "Sync fork" button or `gh repo sync` after this is in place
# — both would either discard this workflow file or open a PR. The pipeline owns
# the sync.

name: Nightly SonarQube Analysis

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write   # needed to force-push the rebased state to origin/master

jobs:
  sonar:
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: "-Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=${{ github.workspace }}/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
      MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
      SONAR_USER_HOME: "${{ github.workspace }}/.sonar"

    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sync fork master with upstream
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git remote add upstream https://github.com/ZUGFeRD/mustangproject.git
          git fetch upstream master
          # Replay our single workflow-file commit on top of latest upstream master.
          # Conflicts here would mean upstream has touched this exact workflow file —
          # see filename choice (lexware-sonar-nightly) which makes that effectively
          # impossible.
          if ! git rebase upstream/master; then
            echo "ERROR: rebase onto upstream/master failed"
            git diff --name-only --diff-filter=U
            git rebase --abort
            exit 1
          fi
          # Push back so the fork tracks upstream and tomorrow's fetch only covers
          # one day's delta. --force-with-lease is safe: nothing else writes to
          # this fork.
          git push --force-with-lease origin HEAD:master

      - name: Cache Maven and Sonar
        uses: actions/cache@v4
        with:
          path: |
            .m2/repository
            .sonar/cache
          key: mvn-sonar-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            mvn-sonar-

      - name: Inject sonar-maven-plugin into pom.xml
        run: |
          set -euo pipefail
          echo "=== Backing up original pom.xml ==="
          cp pom.xml pom.xml.backup

          echo "=== Injecting SonarQube Maven Plugin ==="
          if grep -q "sonar-maven-plugin" pom.xml; then
            echo "INFO: SonarQube plugin already present, skipping injection"
          else
            awk '
              BEGIN { in_build=0; in_plugin_mgmt=0; in_plugins=0; injected=0; }
              /<build>/ { in_build=1; }
              /<\/build>/ { in_build=0; }
              in_build && /<pluginManagement>/ { in_plugin_mgmt=1; }
              in_build && /<\/pluginManagement>/ { in_plugin_mgmt=0; }
              in_build && !in_plugin_mgmt && /<plugins>/ { in_plugins=1; }
              in_build && !in_plugin_mgmt && in_plugins && /<\/plugins>/ && !injected {
                print "            <plugin>";
                print "                <groupId>org.sonarsource.scanner.maven</groupId>";
                print "                <artifactId>sonar-maven-plugin</artifactId>";
                print "                <version>5.5.0.6356</version>";
                print "            </plugin>";
                print "";
                injected=1;
                in_plugins=0;
              }
              { print }
            ' pom.xml > pom.xml.tmp

            if grep -q "sonar-maven-plugin" pom.xml.tmp; then
              mv pom.xml.tmp pom.xml
              echo "Plugin injected successfully"
            else
              rm -f pom.xml.tmp
              echo "Plugin injection failed"
              mv pom.xml.backup pom.xml
              exit 1
            fi
          fi

          echo "=== Verifying Plugin Injection ==="
          if ! grep -q "sonar-maven-plugin" pom.xml; then
            echo "ERROR: SonarQube plugin not found in pom.xml!"
            mv pom.xml.backup pom.xml
            exit 1
          fi
          echo "Injected plugin section:"
          grep -B 2 -A 4 "sonar-maven-plugin" pom.xml || true

      - name: Build (skip tests)
        run: |
          chmod +x mvnw
          ./mvnw $MAVEN_CLI_OPTS clean test-compile -DskipTests

      - name: SonarQube analysis (mocked)
        continue-on-error: true   # mirrors GitLab's allow_failure: true
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          echo "=== SonarQube Analysis Configuration ==="
          # echo "SonarQube Host: $SONAR_HOST_URL"
          # echo "Project Key: mustangproject"
          # echo "Branch: ${GITHUB_REF_NAME}"

          echo "=== Running SonarQube Analysis (Skipped in test) ==="
          # ./mvnw $MAVEN_CLI_OPTS sonar:sonar \
          #   -Dsonar.host.url="$SONAR_HOST_URL" \
          #   -Dsonar.token="$SONAR_TOKEN" \
          #   -Dsonar.projectKey=mustangproject \
          #   -Dsonar.projectName="Mustang Project" \
          #   -Dsonar.projectVersion="${GITHUB_SHA::7}" \
          #   -Dsonar.branch.name="${GITHUB_REF_NAME}" \
          #   -Dsonar.java.binaries="**/target/classes"

          echo "=== SonarQube Analysis Complete ==="

      - name: Upload pom.xml and compiled classes for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pom-and-classes
          path: |
            pom.xml
            pom.xml.backup
            */target/classes/
            */target/test-classes/
          retention-days: 1

      - name: Pipeline complete
        if: always()
        run: |
          echo "=== Pipeline Complete ==="
          if [ -f pom.xml.backup ]; then
            echo "Backup pom.xml available for inspection in artifacts"
          fi
          echo "Check SonarQube dashboard for analysis results: ${SONAR_HOST_URL:-<not set>}"
